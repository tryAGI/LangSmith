  /runs/multipart:
    post:
      tags:
        - runs
      summary: Ingest Runs (Multipart)
      description: "Ingests multiple runs, feedback objects, and binary attachments in a single `multipart/form-data` request.\n**Part‑name pattern**: `<event>.<run_id>[.<field>]` where `event` ∈ {`post`, `patch`, `feedback`, `attachment`}.\n* `post|patch.<run_id>` – JSON run payload.\n* `post|patch.<run_id>.<field>` – out‑of‑band run data (`inputs`, `outputs`, `events`, `error`, `extra`, `serialized`).\n* `feedback.<run_id>` – JSON feedback payload (must include `trace_id`).\n* `attachment.<run_id>.<filename>` – arbitrary binary attachment stored in S3.\n**Headers**: every part must set `Content-Type` **and** either a `Content-Length` header or `length` parameter. Per‑part `Content-Encoding` is **not** allowed; the top‑level request may be `Content-Encoding: gzip` or `Content-Encoding: zstd`.\n**Best performance** for high‑volume ingestion."
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                'post.{run_id}':
                  type: string
                  description: Run to create (JSON)
                  format: binary
                'patch.{run_id}':
                  type: string
                  description: Run to update (JSON)
                  format: binary
                'post.{run_id}.inputs':
                  type: string
                  description: Large inputs object (JSON) stored out‑of‑band
                  format: binary
                'patch.{run_id}.outputs':
                  type: string
                  description: Large outputs object (JSON) stored out‑of‑band
                  format: binary
                'feedback.{run_id}':
                  type: string
                  description: Feedback object (JSON) – must include trace_id
                  format: binary
                'attachment.{run_id}.{filename}':
                  type: string
                  description: 'Binary attachment linked to run {run_id}'
                  format: binary
        required: true
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/runs.ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/runs.ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/runs.ErrorResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
