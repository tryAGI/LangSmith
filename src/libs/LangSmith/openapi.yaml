          title: Additional Kwargs
          type: object
        response_metadata:
          title: Response Metadata
          type: object
        type:
          const: ai
          title: Type
          type: string
          default: ai
        name:
          title: Name
          anyOf:
            - type: string
            - type: 'null'
        id:
          title: Id
          anyOf:
            - type: string
            - type: 'null'
