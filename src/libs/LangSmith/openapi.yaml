  /api/v1/mcp/tools:
    get:
      tags:
        - mcp
      summary: Get Tools
      description: "Return MCP tools — from cache if fresh, otherwise by fetching from remote.\n\nOn cache miss, tries manifest fetch first (fast), then falls back to full\nMCP handshake. Caches the result before returning.\n\nThe ls_user_id query parameter allows service-key callers (which don't carry\nls_user_id in auth) to specify the user for per-user OAuth cache lookups."
      operationId: get_tools_api_v1_mcp_tools_get
      parameters:
        - name: url
          in: query
          required: true
          schema:
            title: Url
            type: string
        - name: oauth_provider_id
          in: query
          schema:
            title: Oauth Provider Id
            anyOf:
              - type: string
              - type: 'null'
        - name: ls_user_id
          in: query
          schema:
            title: Ls User Id
            anyOf:
              - type: string
              - type: 'null'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: { }
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - ApiKey: [ ]
        - TenantId: [ ]
        - BearerAuth: [ ]
    delete:
      tags:
        - mcp
      summary: Invalidate Tools Cache
      description: "Invalidate cached MCP tools for a given server URL.\n\nCalled when a tool call fails with a stale-tools error, so subsequent\nrequests to GET /mcp/tools will re-fetch from the remote server."
      operationId: invalidate_tools_cache_api_v1_mcp_tools_delete
      parameters:
        - name: url
          in: query
          required: true
          schema:
            title: Url
            type: string
        - name: oauth_provider_id
          in: query
          schema:
            title: Oauth Provider Id
            anyOf:
              - type: string
              - type: 'null'
        - name: ls_user_id
          in: query
          schema:
            title: Ls User Id
            anyOf:
              - type: string
