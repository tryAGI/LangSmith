openapi: '3.2.0'
info:
  title: LangSmith
  description: "The LangSmith API is used to programmatically create and manage LangSmith resources.\n\n## Host\nhttps://api.smith.langchain.com\n\n## Authentication\nTo authenticate with the LangSmith API, set the `X-Api-Key` header\nto a valid [LangSmith API key](https://docs.langchain.com/langsmith/create-account-api-key#create-an-api-key).\n\n"
  version: 0.1.0
servers:
  - url: https://api.smith.langchain.com
paths:
  /api/v1/audit-logs:
    get:
      tags:
        - audit-logs
      summary: Get Audit Logs
      description: "Retrieve audit log records for the authenticated user's organization in OCSF format.\n\nRequires both start_time and end_time parameters to filter logs within a date range.\nSupports cursor-based pagination.\n\nReturns results in OCSF API Activity (Class UID: 6003) format,\nwhich is compatible with security monitoring and SIEM tools.\nReference: https://schema.ocsf.io/1.7.0/classes/api_activity"
      operationId: get_audit_logs_api_v1_audit_logs_get
      parameters:
        - name: limit
          in: query
          description: Number of items to return
          schema:
            title: Limit
            maximum: 100
            minimum: 1
            type: integer
            description: Number of items to return
            default: 10
        - name: cursor
          in: query
          description: Cursor for pagination (base64-encoded JSON string)
          schema:
            title: Cursor
            anyOf:
              - type: string
              - type: 'null'
            description: Cursor for pagination (base64-encoded JSON string)
        - name: workspace_id
          in: query
          description: Filter by workspace ID
          schema:
            title: Workspace Id
            anyOf:
              - type: string
                format: uuid
              - type: 'null'
            description: Filter by workspace ID
        - name: start_time
          in: query
          description: Start datetime (inclusive) in ISO 8601 format
          required: true
          schema:
            title: Start Time
            type: string
            description: Start datetime (inclusive) in ISO 8601 format
            format: date-time
        - name: end_time
          in: query
          description: End datetime (inclusive) in ISO 8601 format
          required: true
          schema:
            title: End Time
            type: string
            description: End datetime (inclusive) in ISO 8601 format
            format: date-time
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditLogsOCSFResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - ApiKey: [ ]
        - OrganizationId: [ ]
        - BearerAuth: [ ]
