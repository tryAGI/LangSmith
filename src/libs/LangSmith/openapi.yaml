        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/runs.ErrorResponse'
      security:
        - ApiKey: [ ]
        - TenantId: [ ]
        - BearerAuth: [ ]
